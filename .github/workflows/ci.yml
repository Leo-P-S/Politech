name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests + Análisis de Seguridad
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Instalar Node.js
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install

      # 4. Ejecutar tests
      - name: Ejecutar tests
        run: npm test

      # 5. Análisis SAST con ESLint Security
      - name: 🔒 Análisis de seguridad (ESLint)
        run: |
          npm install eslint-plugin-security
          npx eslint . --ext .js