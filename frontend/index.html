<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Venta de Tickets</title>
    <style>
        /* Un poco de CSS para que se vea moderno y centrado */
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }
        h2 {
            margin-top: 0;
            color: #333;
        }
        input[type="text"], input[type="password"] {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #000000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #FF2244;
        }
    </style>o
</head>
<body>

    <div class="login-box">
        <h2>Iniciar Sesión</h2>
        <form action="/login" method="POST">
            
            <input type="text" name="usuario" placeholder="Ingresar nombre" required>
            
            <input type="password" name="contrasena" placeholder="Ingresar contraseña" required>
            
            <button type="submit">INGRESAR</button>
            
        </form>
    </div>

</body>
</html>
